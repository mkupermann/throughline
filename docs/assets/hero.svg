<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Throughline — the thread that survives every session">
  <title>Throughline — the thread that survives every session</title>
  <desc>Dark hero graphic with a continuous thread weaving through five session dots, the Throughline wordmark, and a tagline.</desc>

  <defs>
    <!-- background gradient (subtle top-left to bottom-right) -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#0D1117"/>
      <stop offset="100%" stop-color="#0A0E14"/>
    </linearGradient>

    <!-- thread gradient across accent + success -->
    <linearGradient id="thread" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#58A6FF"/>
      <stop offset="55%"  stop-color="#58A6FF"/>
      <stop offset="100%" stop-color="#7EE787"/>
    </linearGradient>

    <!-- glow filter for the thread -->
    <filter id="glow" x="-10%" y="-40%" width="120%" height="180%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- faint dot grid pattern -->
    <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#1F2630"/>
    </pattern>

    <!-- session node style -->
    <radialGradient id="node" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#1F2630"/>
      <stop offset="70%" stop-color="#161B22"/>
      <stop offset="100%" stop-color="#0D1117"/>
    </radialGradient>
  </defs>

  <!-- background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.6"/>

  <!-- top micro label -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" fill="#8B949E" font-size="14" letter-spacing="3">
    <text x="72" y="78">PERSISTENT LONG-TERM MEMORY FOR CLAUDE CODE</text>
  </g>

  <!-- the thread: a continuous curve weaving through five session nodes -->
  <!-- nodes at y ~ 355 centers; wave amplitude ~ 55 -->
  <g filter="url(#glow)">
    <path d="
        M 80  355
        C 200 255, 320 455, 440 355
        S 680 255, 800 355
        S 1040 455, 1160 355"
      fill="none"
      stroke="url(#thread)"
      stroke-width="5"
      stroke-linecap="round"/>
  </g>

  <!-- session nodes -->
  <g>
    <!-- node 1 -->
    <g transform="translate(80 355)">
      <circle r="28" fill="url(#node)" stroke="#30363D" stroke-width="1.5"/>
      <circle r="7" fill="#58A6FF"/>
      <text x="0" y="62" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12" fill="#6E7681">session 1</text>
    </g>
    <!-- node 2 -->
    <g transform="translate(350 355)">
      <circle r="28" fill="url(#node)" stroke="#30363D" stroke-width="1.5"/>
      <circle r="7" fill="#58A6FF"/>
      <text x="0" y="62" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12" fill="#6E7681">session 2</text>
    </g>
    <!-- node 3 (center) -->
    <g transform="translate(600 355)">
      <circle r="32" fill="url(#node)" stroke="#30363D" stroke-width="1.5"/>
      <circle r="9" fill="#58A6FF"/>
      <text x="0" y="64" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12" fill="#6E7681">session 3</text>
    </g>
    <!-- node 4 -->
    <g transform="translate(850 355)">
      <circle r="28" fill="url(#node)" stroke="#30363D" stroke-width="1.5"/>
      <circle r="7" fill="#7EE787"/>
      <text x="0" y="62" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12" fill="#6E7681">session 4</text>
    </g>
    <!-- node 5 -->
    <g transform="translate(1120 355)">
      <circle r="28" fill="url(#node)" stroke="#30363D" stroke-width="1.5"/>
      <circle r="7" fill="#7EE787"/>
      <text x="0" y="62" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12" fill="#6E7681">session 5</text>
    </g>
  </g>

  <!-- wordmark -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif">
    <text x="72" y="200" font-size="124" font-weight="700" fill="#C9D1D9" letter-spacing="-3">
      Throughline
    </text>

    <!-- tagline -->
    <text x="76" y="250" font-size="26" font-weight="400" fill="#8B949E" letter-spacing="0.3">
      The thread that survives every session.
    </text>
  </g>

  <!-- footer strip -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" fill="#6E7681">
    <text x="72"   y="555">Postgres · pgvector · local-first · MIT</text>
    <text x="1128" y="555" text-anchor="end">github.com/mkupermann/throughline</text>
  </g>

  <!-- bottom accent bar -->
  <rect x="72" y="575" width="1056" height="2" fill="#21262D"/>
  <rect x="72" y="575" width="180"  height="2" fill="#58A6FF"/>
  <rect x="252" y="575" width="60"  height="2" fill="#7EE787"/>
</svg>
